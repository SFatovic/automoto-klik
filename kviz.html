<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kviz | AutoMoto KLIK!</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body id="quizPage">

  <div id="site-header"></div>

  <section class="hero-wrap hero-wrap-compact">
    <div class="container">
      <div class="hero-card">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <p class="hero-kicker">Kviz</p>
            <h1 id="quizTitle" class="hero-title hero-title-small">Učitavanje kviza...</h1>
            <p id="quizDescription" class="hero-subtitle mb-0">
              Pričekaj trenutak dok se kviz učitava.
            </p>
          </div>

          <div class="col-lg-4 text-lg-end">
            <a href="kvizovi.html" class="btn btn-hero-secondary">← Natrag na kvizove</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main>
    <section class="generator-section py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-10">
            <div id="quizProgress" class="mb-3 text-center"></div>
            <div id="quizContent"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="components.js" defer></script>
  <script src="quiz-engine.js" defer></script>
</body>
</html>
