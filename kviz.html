<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kviz | AutoMoto KLIK!</title>

  <meta
    name="description"
    content="Riješi auto kviz na AutoMoto KLIK i testiraj svoje znanje o automobilskim brandovima, Formuli 1 i auto temama."
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body id="quizPage" class="quiz-page-redesign">

  <div id="site-header"></div>

  <main class="quiz-stage-main">
    <section class="quiz-stage-section">
      <div class="container quiz-stage-container">
        <div class="quiz-stage-layout">
          <aside class="quiz-side-rail quiz-side-rail-left" aria-hidden="true">
            <div class="quiz-promo-card quiz-promo-card-vertical">
              <div class="quiz-promo-visual"></div>
              <span class="quiz-promo-text">Promo</span>
            </div>
          </aside>

          <section class="quiz-center-column" aria-label="Aktivni kviz">
            <div class="quiz-shell quiz-shell-stage">
              <div class="quiz-topbar">
                <div id="quizProgress" class="quiz-topbar-progress" aria-live="polite"></div>
              </div>

              <div id="quizContent" class="quiz-content-area quiz-content-area-stage">
                <div class="quiz-loading-state">
                  <div class="quiz-loading-card">
                    <h2 class="quiz-loading-title">Učitavanje kviza...</h2>
                    <p class="quiz-loading-text">
                      Ako si na lokalnom računalu, pokreni projekt preko local servera kako bi se JSON datoteke ispravno učitale.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <aside class="quiz-side-rail quiz-side-rail-right" aria-hidden="true">
            <div class="quiz-promo-card quiz-promo-card-vertical">
              <div class="quiz-promo-visual"></div>
              <span class="quiz-promo-text">Promo</span>
            </div>
          </aside>
        </div>

        <div class="quiz-bottom-promo" aria-hidden="true">
          <div class="quiz-promo-card quiz-promo-card-horizontal">
            <div class="quiz-promo-visual"></div>
            <span class="quiz-promo-text">Promo</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="components.js" defer></script>
  <script src="quiz-engine.js" defer></script>
</body>
</html>
