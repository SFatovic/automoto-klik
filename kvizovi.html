<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kvizovi | AutoMoto KLIK!</title>
  <meta
    name="description"
    content="Odaberi auto kviz i testiraj svoje znanje o brandovima, Formuli 1 i općim auto temama na AutoMoto KLIK."
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quizzes-page">

  <div id="site-header"></div>

  <main id="main-content">
    <section class="tools-section quizzes-page-section py-5">
      <div class="container">
        <div class="row justify-content-center mb-4 mb-lg-5">
          <div class="col-xl-9 col-lg-10 text-center">
            <h1 class="section-title mb-3">Odaberi kviz i testiraj svoje znanje+++</h1>
            <p class="section-subtitle mb-0">
             Interaktivni auto kvizovi koji spajaju zabavu, znanje i strast prema automobilima.
            </p>
          </div>
        </div>

        <section class="quizzes-filter-section mb-4" aria-labelledby="quiz-filters-title">
          <div class="row justify-content-center">
            <div class="col-xl-10">
              <h2 id="quiz-filters-title" class="visually-hidden">Filtriranje kvizova</h2>
              <div id="quizCategoryFilters" class="quiz-filters-wrap" aria-live="polite">
                <!-- Filtere ubacuje quiz-engine.js -->
              </div>
            </div>
          </div>
        </section>

        <section class="quizzes-grid-section" aria-labelledby="quiz-list-title">
          <div class="row justify-content-center mb-3">
            <div class="col-xl-10">
              <h2 id="quiz-list-title" class="visually-hidden">Popis kvizova</h2>
            </div>
          </div>

          <div id="quizzesGrid" class="row g-4">
            <!-- Kartice ubacuje quiz-engine.js -->
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="components.js" defer></script>
  <script src="quiz-engine.js" defer></script>
</body>
</html>
